services:
  - type: web
    name: defenseiq-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
  - type: worker
    name: defenseiq-worker
    env: node
    rootDir: apps/worker
    buildCommand: npm install
    startCommand: npm run dev
